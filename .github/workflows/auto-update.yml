name: Lay. Catch Board - キャッチコピー自動更新

on:
  schedule:
    # 毎時0分に実行（JST = UTC+9 なので UTC 毎時0分）
    - cron: '0 * * * *'
  workflow_dispatch:
    # ダッシュボードの「今すぐ実行」ボタンからも手動実行可能

jobs:
  update-catch:
    name: キャッチコピー更新
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: Playwright ブラウザインストール
        run: npx playwright install chromium --with-deps

      - name: キャッチコピー更新実行
        env:
          SALON_BOARD_ID:       ${{ secrets.SALON_BOARD_ID }}
          SALON_BOARD_PASSWORD: ${{ secrets.SALON_BOARD_PASSWORD }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
        run: node scripts/update-catch.js

      - name: 実行結果をサマリーに表示
        if: always()
        run: |
          echo "## 実行完了" >> $GITHUB_STEP_SUMMARY
          echo "- 実行時刻: $(TZ=Asia/Tokyo date '+%Y/%m/%d %H:%M JST')" >> $GITHUB_STEP_SUMMARY
