name: キャッチコピー自動更新（無効化済み）

# Chrome拡張機能（Lay. Catch Board）に移行したため、このワークフローは無効化
# salonboard.comはGitHub ActionsのIPをブロックするため動作不可
on:
  workflow_dispatch:
    # 手動実行のみ（デバッグ用に残す）

jobs:
  update-catch:
    name: キャッチコピー更新（手動のみ）
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 案内
        run: |
          echo "このワークフローは無効化されています"
          echo "キャッチコピーの自動更新はChrome拡張機能（Lay. Catch Board）が担当しています"
          echo "chrome://extensions/ でLay. Catch Boardを確認してください"
