<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      font-size: 13px;
      background: #f5f7f5;
      color: #1a1a1a;
    }
    .header {
      background: #1a4a2e;
      color: white;
      padding: 12px 16px;
    }
    .logo { font-weight: 700; font-size: 14px; }
    .sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .body { padding: 12px; }

    /* セクションラベル */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: #1a4a2e;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 5px;
      padding-left: 2px;
    }

    /* 最新実行キャッチ */
    .catch-current {
      background: #e8f0eb;
      border: 1.5px solid #1a4a2e;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #1a4a2e;
      margin-bottom: 4px;
      word-break: break-all;
      min-height: 36px;
    }
    .catch-meta {
      font-size: 10px;
      color: #666;
      margin-bottom: 10px;
      padding-left: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 次回予測キャッチ */
    .catch-next {
      background: #fff;
      border: 1.5px dashed #7aad8e;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #2d6b44;
      margin-bottom: 4px;
      word-break: break-all;
      min-height: 36px;
    }
    .next-meta {
      font-size: 10px;
      color: #888;
      margin-bottom: 12px;
      padding-left: 2px;
    }

    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }
    .badge-success { background: #e8f5e9; color: #2e7d32; }
    .badge-error { background: #ffebee; color: #c62828; }
    .badge-no_slots { background: #fff3e0; color: #f57c00; }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .toggle-label { font-size: 13px; font-weight: 600; }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: #1a4a2e; }

    .btn {
      width: 100%;
      background: #1a4a2e;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 6px;
    }
    .btn:hover { background: #2d6b44; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
      width: 100%;
      background: white;
      color: #1a4a2e;
      border: 1px solid #1a4a2e;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .msg { font-size: 11px; color: #666; text-align: center; padding: 6px 0; }
    .divider { border: none; border-top: 1px solid #e8ede9; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Lay. Catch Board</div>
    <div class="sub">キャッチコピー自動更新</div>
  </div>

  <div class="body">

    <!-- 最新実行キャッチ -->
    <div class="section-label">▶ 最新実行キャッチ</div>
    <div id="lastCatch" class="catch-current">—</div>
    <div class="catch-meta">
      <span id="lastStatus">—</span>
      <span id="lastRun" style="color:#999">—</span>
    </div>

    <!-- 次回予測キャッチ -->
    <div class="section-label">⏭ 次回予測キャッチ</div>
    <div id="nextCatch" class="catch-next">—</div>
    <div class="next-meta" id="nextRunTime">次回実行: —</div>

    <hr class="divider">

    <!-- 自動更新トグル -->
    <div class="toggle-row">
      <span class="toggle-label">自動更新</span>
      <input type="checkbox" id="isActive" checked>
    </div>

    <button class="btn" id="runNow">今すぐ実行</button>
    <button class="btn-outline" id="openDashboard">管理画面を開く</button>

    <div class="msg" id="msg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
